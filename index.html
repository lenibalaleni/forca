<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Forca</title>
  <meta name="description"
    content="Jogo da Forca interativo com palavras em português. Tenta adivinhar a palavra antes que o boneco seja enforcado!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">

    <!-- Category Selection Screen -->
    <div id="category-screen" class="category-screen">
      <h2 class="selection-title">Escolha uma Categoria</h2>
      <div class="category-gri">
        <button class="cat-btn" data-cat="Filmes">🎬 Filmes</button>
        <button class="cat-btn" data-cat="Séries">📺 Séries</button>
        <button class="cat-btn" data-cat="Comida">🍕 Comida</button>
        <button class="cat-btn" data-cat="Desporto">⚽ Desporto</button>
        <button class="cat-btn" data-cat="Países">🌍 Países</button>
      </div>
    </div>

    <!-- Game Content (Hidden initially) -->
    <div id="game-container" class="hidden">
      <!-- Header -->
      <header class="header">
        <h1 class="title">🪢 Jogo da Forca</h1>
        <div class="stats">
          <div class="stat-pill" id="stat-erros">
            <span class="stat-label">Erros</span>
            <span class="stat-value" id="error-count">0 / 6</span>
          </div>
          <div class="stat-pill" id="stat-categoria">
            <span class="stat-label">Categoria</span>
            <span class="stat-value" id="category-name">—</span>
          </div>
        </div>
      </header>

      <!-- Main game area -->
      <main class="game-area">

        <!-- Hangman drawing -->
        <div class="gallows-wrapper">
          <svg id="hangman-svg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
            <!-- Gallows structure (always visible) -->
            <line x1="20" y1="210" x2="180" y2="210" stroke="#a8d4f5" stroke-width="5" stroke-linecap="round" />
            <line x1="60" y1="210" x2="60" y2="20" stroke="#a8d4f5" stroke-width="5" stroke-linecap="round" />
            <line x1="60" y1="20" x2="130" y2="20" stroke="#a8d4f5" stroke-width="5" stroke-linecap="round" />
            <line x1="130" y1="20" x2="130" y2="45" stroke="#a8d4f5" stroke-width="5" stroke-linecap="round" />

            <!-- Body parts (hidden initially) -->
            <circle id="part-head" cx="130" cy="60" r="15" stroke="#3b8fd4" stroke-width="4" fill="none"
              class="body-part hidden" />
            <line id="part-body" x1="130" y1="75" x2="130" y2="130" stroke="#3b8fd4" stroke-width="4"
              stroke-linecap="round" class="body-part hidden" />
            <line id="part-left-arm" x1="130" y1="90" x2="105" y2="115" stroke="#3b8fd4" stroke-width="4"
              stroke-linecap="round" class="body-part hidden" />
            <line id="part-right-arm" x1="130" y1="90" x2="155" y2="115" stroke="#3b8fd4" stroke-width="4"
              stroke-linecap="round" class="body-part hidden" />
            <line id="part-left-leg" x1="130" y1="130" x2="105" y2="160" stroke="#3b8fd4" stroke-width="4"
              stroke-linecap="round" class="body-part hidden" />
            <line id="part-right-leg" x1="130" y1="130" x2="155" y2="160" stroke="#3b8fd4" stroke-width="4"
              stroke-linecap="round" class="body-part hidden" />
          </svg>
        </div>

        <!-- Word display -->
        <div class="word-section">
          <div class="hint-text" id="hint-text"></div>
          <div class="word-display" id="word-display"></div>
          <div class="wrong-letters-wrap">
            <span class="wrong-label" id="wrong-label"></span>
            <span class="wrong-letters" id="wrong-letters"></span>
          </div>
        </div>

      </main>

      <!-- Alphabet keyboard -->
      <section class="keyboard-section" aria-label="Teclado de letras">
        <div class="keyboard" id="keyboard"></div>
      </section>

      <!-- Message overlay -->
      <div class="overlay hidden" id="overlay">
        <div class="overlay-card" id="overlay-card">
          <div class="overlay-emoji" id="overlay-emoji"></div>
          <h2 class="overlay-title" id="overlay-title"></h2>
          <p class="overlay-message" id="overlay-message"></p>
          <button class="btn-play-again" id="btn-play-again">Voltar ao Início</button>
        </div>
      </div>
    </div>

  </div>

  <script src="index.js"></script>
</body>

</html>
